name: WordPress Auto Blog Failover 2

on:
  schedule:
    - cron: "3,18,33,48 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wordpress-autoblog-failover-2
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out site automation
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Prepare runtime folders
        run: |
          mkdir -p data
          mkdir -p out/images

      - name: Refresh latest posted state
        run: |
          git fetch origin "${GITHUB_REF##*/}"
          git checkout origin/"${GITHUB_REF##*/}" -- data/last_run_status.json data/x_shared_posts.json data/autoblog.sqlite3 || true

      - name: Publish one post if a fresh topic is available
        env:
          WP_POST_METHOD: email
          POST_BY_EMAIL_ADDRESS: ${{ secrets.POST_BY_EMAIL_ADDRESS }}
          POST_BY_EMAIL_PUBLICIZE: ""
          POST_STATUS: publish
          AUTO_PUBLISH_CONFIRM: I_UNDERSTAND_POSTS_GO_LIVE
          ARTICLE_GENERATOR: free
          HERO_IMAGE_MODE: real
          MAX_POSTS_PER_RUN: "1"
          MAX_POSTS_PER_DAY: "96"
          SOCIAL_SHARE_TITLE_ONLY: "true"
          X_SHARE_TITLE_ONLY: "true"
          LOOKBACK_HOURS: "96"
          MIN_SOURCES_PER_POST: "2"
          REQUEST_TIMEOUT_SECONDS: "25"
          RUN_LOCK_STALE_SECONDS: "1800"
          TOPIC_FOCUS_KEYWORDS: science,scientists,research,researchers,breakthrough,discovery,experiment,study,physics,biology,chemistry,climate,energy,robotics,space,nasa,astronomy,planet,moon,mars,telescope,galaxy,phone,phones,iphone,ios,android,apple,samsung,pixel,gadget,gadgets,ai,artificial intelligence,software,apps,app,innovation
          CATEGORY_ROTATION: science,space,ai,gadgets,phones,android,apple,software,security,tutorials,hacks
          CATEGORY_WEIGHTS: science=6,space=6,ai=6,gadgets=6,security=6,tutorials=6,hacks=6,phones=6,apple=6,android=6,software=6,tech=4
          RECENT_CATEGORY_WINDOW: "8"
          RECENT_CATEGORY_PENALTY: "4"
          ALLOW_SINGLE_SOURCE_PRIORITY_POSTS: "true"
          SINGLE_SOURCE_PRIORITY_CATEGORIES: science,space
          SINGLE_SOURCE_MIN_QUALITY: "4"
          WP_CREATE_TERMS: "false"
          BLOCKLIST_DOMAINS: ""
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: "true"
          SMTP_USE_SSL: "false"
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: python src/wp_auto_blog.py run

      - name: Share new published posts to X
        env:
          BLOG_FEED_URL: https://chuckyscarnage.tech.blog/feed/
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_USER_ACCESS_TOKEN: ${{ secrets.X_USER_ACCESS_TOKEN }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          X_SHARE_MAX_PER_RUN: "2"
          X_SHARE_BACKFILL: "false"
          SOCIAL_SHARE_TITLE_ONLY: "true"
          X_SHARE_TITLE_ONLY: "true"
          X_SHARE_TEMPLATE: "{title}"
          X_SHARE_STATE_PATH: data/x_shared_posts.json
          REQUEST_TIMEOUT_SECONDS: "25"
        run: python src/share_blog_to_x.py

      - name: Save posting memory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/.gitkeep data/autoblog.sqlite3
          if [ -f data/x_shared_posts.json ]; then
            git add -f data/x_shared_posts.json
          fi
          if git diff --cached --quiet; then
            echo "No posting state changes to save."
          else
            git commit -m "Update WordPress auto-blog state"
            git pull --rebase --autostash origin "${GITHUB_REF##*/}" || true
            git push origin HEAD:"${GITHUB_REF##*/}" || true
          fi
